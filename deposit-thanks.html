<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>Deposit received — Lumière Aesthetics</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
<style>
:root{--ivory:#faf6f1;--charcoal:#2b2622;--muted:#6f655c;--gold-deep:#9a7850;--blush:#e8d5cc;--line:#e5dcd1;--white:#fffdfb;}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;color:var(--charcoal);background:var(--ivory);line-height:1.6;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 24px}
.card{max-width:520px;text-align:center;background:var(--white);border:1px solid var(--line);border-radius:24px;padding:56px 40px;box-shadow:0 30px 60px -34px rgba(43,38,34,0.2)}
.tick{width:72px;height:72px;border-radius:50%;background:var(--blush);display:flex;align-items:center;justify-content:center;margin:0 auto 24px;font-size:36px;color:var(--gold-deep)}
h1{font-family:'Cormorant Garamond',Georgia,serif;font-size:44px;font-weight:600;line-height:1.1;margin-bottom:14px;color:var(--charcoal)}
h1 em{font-style:italic;color:var(--gold-deep)}
p{color:var(--muted);font-size:17px;margin-bottom:14px}
.brand{margin-top:32px;font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--charcoal)}
.brand span{color:var(--gold-deep)}
a{color:var(--gold-deep);text-decoration:none;font-weight:500}
</style>
</head>
<body>
<main class="card">
<div class="tick">✓</div>
<h1><em>Thank you</em>,<br/>your deposit is in.</h1>
<p>You'll receive a text shortly with the full details of your appointment.</p>
<p>The deposit comes straight off the cost of your treatment on the day. Looking forward to seeing you.</p>
<div class="brand">Lumière <span>Aesthetics</span></div>
<p style="margin-top:24px;font-size:14px"><a href="/">← Back to meeteva.ie</a></p>
</main>
</body>
</html>
